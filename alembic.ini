# Alembic configuration for Spec-Atlas (two databases via the multidb pattern).
# Database URLs are NOT stored here — env.py loads them from spec_atlas.config
# (ANALYSIS_DB_URL / SPEC_DB_URL). A single `alembic upgrade head` migrates both.

[alembic]
script_location = migrations
databases = analysis, spec
prepend_sys_path = .
path_separator = os

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
